name: enprotech

services:
  app:
    build:
      context: .
      target: runner
    image: enprotech-app
    env_file: .env
    environment:
      # Database & auth (wajib — set di Dokploy UI atau .env lokal)
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-604800}
      S3_ENDPOINT: ${S3_ENDPOINT:?wajib diisi, mis. https://cdn.enprotech.id}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?wajib diisi, samakan dengan RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?wajib diisi, samakan dengan RUSTFS_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-uploads}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-${S3_ENDPOINT}}
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
