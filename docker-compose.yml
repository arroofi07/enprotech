name: enprotech

services:
  app:
    build:
      context: .
      target: runner
    image: enprotech-app
    env_file: .env
    environment:
      # Database & auth (wajib — set di Dokploy UI atau .env lokal)
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-604800}
      # Storage — endpoint internal compose; kredensial dari env yang sama dengan rustfs
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-uploads}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    depends_on:
      rustfs:
        condition: service_started
    networks:
      - default
      - dokploy-network
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    # Tidak ada `ports:` — 9000 (S3 API) & 9001 (Console) tidak di-publish ke host.
    # Domain untuk keduanya diatur via Dokploy UI (Traefik label di-generate Dokploy):
    #   - cdn.enprotech.id            → container port 9000 (S3 API, serve gambar)
    #   - <domain-console-pilihanmu>  → container port 9001 (Console UI)
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    networks:
      - default # jaringan internal compose: app reach `rustfs`
      - dokploy-network # wajib agar Traefik Dokploy bisa route ke service ini
    restart: unless-stopped

networks:
  # Jaringan Traefik milik Dokploy (sudah ada di host, dibuat oleh Dokploy).
  dokploy-network:
    external: true

volumes:
  rustfs-data:
  rustfs-logs:
